name: aartiapp
description: "Aarti Sangrah — A complete Hindu prayer book app."
publish_to: 'none'
version: 2.0.0+3

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.0

  # Typography
  google_fonts: ^6.2.1

  # Audio
  just_audio: ^0.9.42

  # Sharing (v1.5)
  share_plus: ^10.1.4

  # File system paths (activity log)
  path_provider: ^2.1.5

  # Notifications (v1.5)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Device and package metadata
  device_info_plus: ^11.5.0
  package_info_plus: ^8.3.1

  # Stable local identity generation
  uuid: ^4.5.1

  # Image capture for sharing
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/festivals/
