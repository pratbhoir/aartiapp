name: Build and Upload Release APK

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aartiapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aartiapp-release-${{ github.sha }}
          path: aartiapp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload APK to WebDAV
        run: |
          TS=$(date +"%d%y-%H%M")
          FILE_NAME="aartiapp-git-${TS}.apk"

          curl --fail --digest \
            --user "foozy:wall1!Crew" \
            --upload-file build/app/outputs/flutter-apk/app-release.apk \
            "https://webdav.foozylab.com/share/aartiapp/${{ secrets.WEBDAV_PASSWORD }}-${FILE_NAME}"
