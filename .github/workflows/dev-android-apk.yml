name: Build Android APK (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: aartiapp
        run: flutter pub get

      - name: Build release APK
        working-directory: aartiapp
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aartiapp-release-${{ github.sha }}
          path: aartiapp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload APK to WebDAV
        run: |
          curl --fail \
            --user "foozy:${{ secrets.WEBDAV_PASSWORD }}" \
            --upload-file aartiapp/build/app/outputs/flutter-apk/app-release.apk \
            https://webdav.foozylab.com/share/aartiapp/app-release-${{ github.sha }}.apk
